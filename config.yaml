gpu_id: '0'
log_wandb: False

# mamba4rec settings
hidden_size: 64                 # (int) Number of features in the hidden state.
num_layers: 1                   # (int) Number of Mamba layers.
dropout_prob: 0.2               # (float) Dropout rate.
loss_type: 'CE'                 # (str) Type of loss function. Range in ['BPR', 'CE'].

d_state: 32                     # (int) SSM state expansion factor
d_conv: 4                       # (int) Local convolution width
expand: 2                       # (int) Block expansion factor

# LLM Fusion settings
use_llm_fusion: True            # (bool) Enable LLM fusion for inference
llm_dim: 768                    # (int) Dimension of LLM embeddings (sentence-transformers)
fusion_dropout: 0.1             # (float) Dropout rate in fusion layers
vector_gate: True               # (bool) Use per-dimension gating instead of scalar

# dataset settings
dataset: ml-latest-small
data_path: ../data/
MAX_ITEM_LIST_LENGTH: 50

# dataset: amazon-beauty
# dataset: amazon-video-games
# MAX_ITEM_LIST_LENGTH: 50      # 50 for Amazon datasets

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
load_col:
    inter: [user_id, item_id, timestamp]

user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

# training settings
epochs: 300
train_batch_size: 256
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 10
train_neg_sample_args: ~

# Phase 2 training settings (LLM alignment)
phase2_learning_rate: 0.0005    # Lower LR for alignment phase
phase2_epochs: 50

# Phase 3 training settings (Joint fine-tuning)
phase3_learning_rate: 0.0001    # Very low LR for fine-tuning
phase3_epochs: 20
ewc_lambda: 0.4                 # EWC regularization strength

# evalution settings
metrics: ['Hit', 'NDCG', 'MRR']
valid_metric: NDCG@10
eval_batch_size: 512
weight_decay: 0.0
topk: [10]

# =============================================================================
# Fusion Dual-Arm Configuration
# Copy this file to config_ml32m.yaml and modify as needed.
# =============================================================================

# =============================================================================
# Mamba (behavioral arm)
# The sequential recommender that learns from user interaction histories.
# =============================================================================
dataset: ml-32m                    # Dataset name (e.g., ml-32m, ml-1m)
hidden_size: 64                    # Number of features in the hidden state
num_layers: 1                      # Number of Mamba layers
dropout_prob: 0.2                  # Dropout rate
d_state: 32                        # SSM state expansion factor
d_conv: 4                          # Local convolution width
expand: 2                          # Block expansion factor
loss_type: CE                      # Loss function: 'BPR' (pairwise) or 'CE' (cross-entropy)
epochs: 20                         # Maximum training epochs
train_batch_size: 2048             # Training batch size
learning_rate: 0.001               # Learning rate for Adam optimizer
stopping_step: 5                   # Early stopping patience (epochs without improvement)
MAX_ITEM_LIST_LENGTH: 50           # Maximum sequence length per user
eval_batch_size: 1024              # Evaluation batch size
metrics: ['Hit', 'NDCG', 'MRR']   # Evaluation metrics
valid_metric: 'NDCG@10'           # Metric used for early stopping / model selection
rating_threshold: 3.5              # Minimum rating to consider as positive feedback

# =============================================================================
# Content tower
# Encodes item plots/descriptions into dense vectors for semantic retrieval.
# =============================================================================
embedding_model: BAAI/bge-large-en-v1.5   # HuggingFace model for text embeddings
embedding_dim: 1024                        # Output dimension of the embedding model
faiss_index_path: data/plots.faiss         # Path to the FAISS index of plot embeddings
plots_metadata_path: data/plots_metadata.parquet  # Path to plot metadata (titles, IMDb IDs, etc.)

# =============================================================================
# Reranker
# Blends Mamba scores with content-tower similarity to produce final rankings.
# =============================================================================
alpha_mode: implicit               # 'fixed' for constant alpha, 'implicit' for learned/adaptive
alpha_fixed: 0.5                   # Weight given to content arm when alpha_mode is 'fixed'
alpha_min: 0.3                     # Lower bound for adaptive alpha
alpha_max: 0.9                     # Upper bound for adaptive alpha
home_feed_alpha: 0.2               # Content weight for the home/explore feed
group_fairness_lambda: 0.5         # Regularization for group-level fairness in reranking

# =============================================================================
# Graduation
# Controls when cold-start users "graduate" into the behavioral arm and
# triggers model retraining.
# =============================================================================
graduation_threshold: 50           # Number of interactions before a user graduates
retrain_trigger: all               # What triggers retraining: 'all', 'graduation', 'schedule'
retrain_schedule: weekly           # Retraining cadence when schedule-based
retrain_on_graduation_count: 100   # Retrain after this many users graduate
retraining_queue_path: data/retraining_queue.json  # Queue file for pending retraining jobs

# =============================================================================
# Chatbot
# LLM-powered conversational interface for preference elicitation.
# =============================================================================
chat_provider: openai              # LLM provider: 'openai', 'anthropic', etc.
chat_model: gpt-4o                 # Model name for the chat provider

# =============================================================================
# User profiles
# Online user-preference vectors that decay over time and adapt to mood.
# =============================================================================
profile_decay: 0.95                # Exponential decay factor for historical preferences
profile_learning_rate: 0.1         # Step size for online profile updates
profile_dim: 1024                  # Dimension of the user profile vector
mood_ttl: 1800                     # Time-to-live (seconds) for mood-based adjustments
